<!DOCTYPE html>
<html lang="es">

    <meta name="description" content="Consulta el estado de tu boleta escaneando el código QR." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
