<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mis boletas | Sueños Dorados</title>
    <meta name="description" content="Consulta y descarga tus pachas con tu cédula." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/boletas.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a href="./index.html" class="brand" aria-label="Sueños Dorados">
          <div class="brand-symbol">
            <img src="./logo.png" alt="" />
          </div>
          <div class="brand-text">
            <strong>SUEÑOS</strong>
            <small>DORADOS</small>
          </div>
        </a>
        <nav class="desktop-nav" aria-label="Navegación">
          <a href="./index.html">Inicio</a>
          <a href="./index.html#reservar">Participar</a>
          <a href="./mis-boletas.html" class="active">Mis boletas</a>
        </nav>
        <div class="header-actions">
          <a
            href="https://wa.me/573137343527"
            class="header-contact"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="contact-icon">●</span>
            313 734 3527
          </a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <div class="page-card">
        <div class="page-hero">
          <img class="brand-logo" src="./logo.png" alt="" />
          <h1>Mis boletas</h1>
          <p>Ingresa tu cédula para ver y descargar tus pachas, igual que en el sistema.</p>
        </div>

        <form id="form-cedula" class="lookup-form" autocomplete="off">
          <label>
            Cédula / identificación
            <input
              id="input-cedula"
              name="cedula"
              required
              inputmode="numeric"
              maxlength="30"
              placeholder="Ej. 1001234567"
            />
          </label>
          <button type="submit" class="btn-gold cut" id="btn-buscar">Consultar</button>
        </form>

        <div id="status" class="status-box hidden" role="status"></div>

        <div id="resultado" class="hidden">
          <div class="cliente-bar" id="cliente-bar"></div>
          <div id="rifas-container"></div>
        </div>

        <p style="text-align: center">
          <a class="back-home" href="./index.html">← Volver al inicio</a>
        </p>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/boleta-ticket.js"></script>
    <script src="./js/mis-boletas.js"></script>
  </body>
</html>
