# Sueños Dorados — landing estática (Netlify)
[build]
  publish = "."
  command = "exit 0"

# QR → /verificar/:hash  |  Mis boletas → /mis-boletas
[[redirects]]
  from = "/verificar/*"
  to = "/verificar.html"
  status = 200

[[redirects]]
  from = "/mis-boletas"
  to = "/mis-boletas.html"
  status = 200

[[redirects]]
  from = "/mis-boletas/*"
  to = "/mis-boletas.html"
  status = 200

[[redirects]]
  from = "/pago-resultado"
  to = "/pago-resultado.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
